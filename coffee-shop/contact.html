<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brew & Co — Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation -->
  <header>
    <nav>
      <div class="logo">Brew &amp; Co</div>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main content -->
  <main>

    <section class="contact-page">
      <h1>Find Us</h1>

      <div class="contact-layout">

        <!-- Info column -->
        <div class="contact-info">
          <h2>Location &amp; Hours</h2>
          <address>
            <p>42 Maple Street</p>
            <p>Portland, OR 97201</p>
          </address>
          <table class="hours-table">
            <tbody>
              <tr><td>Monday – Friday</td><td>7:00 am – 6:00 pm</td></tr>
              <tr><td>Saturday</td><td>8:00 am – 5:00 pm</td></tr>
              <tr><td>Sunday</td><td>9:00 am – 3:00 pm</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Form column -->
        <div class="contact-form-wrap">
          <h2>Send Us a Message</h2>
          <form class="contact-form" action="#" method="post">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required />

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="What's on your mind?" required></textarea>

            <button type="submit" class="btn">Send Message</button>
          </form>
        </div>

      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Brew &amp; Co</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
